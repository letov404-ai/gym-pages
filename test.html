<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="background:#1a1a2e;color:white;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:sans-serif">
<div style="text-align:center">
<h1>GymTracker Test</h1>
<p id="info">Loading...</p>
<script>
var tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }
document.getElementById('info').textContent = 'OK! TG=' + (tg ? 'yes' : 'no') + ' time=' + new Date().toISOString();
</script>
</div>
</body>
</html>
